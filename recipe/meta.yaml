{% set name = "pyqgc" %}
{% set version = "0.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyqgc-{{ version }}.tar.gz
  sha256: 3ad3fe6e865951d05cc87307f7263d4f5bd0a8023bec9beb24501310afbc0671
build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=75.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - pynmeagps >=1.1.2
    - pyrtcm >=1.1.10

test:
  imports:
    - pyqgc
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/semuconsulting/pyqgc
  description: Python library for parsing and generating Quectel QGC GNSS protocol messages.
  summary: QGC protocol parser and generator
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://www.semuconsulting.com/pyqgc
  dev_url: https://github.com/semuconsulting/pyqgc

extra:
  recipe-maintainers:
    - semuadmin
