{% set name = "pyqgc" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyqgc-{{ version }}.tar.gz
  sha256: 6a13d7ebd794984c9dad7a5d0b84c400c9bc6a61fc1a7dd2a92657166ab857de
build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=75.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - pynmeagps >=1.1.4
    - pyrtcm >=1.1.12

test:
  imports:
    - pyqgc
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/semuconsulting/pyqgc
  description: Python library for parsing and generating Quectel QGC GNSS protocol messages.
  summary: QGC protocol parser and generator
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://www.semuconsulting.com/pyqgc
  dev_url: https://github.com/semuconsulting/pyqgc

extra:
  recipe-maintainers:
    - semuadmin
